# ============================================================================
# Development stack
# ----------------------------------------------------------------------------
#   app    PHP-FPM + nginx + Vite dev server  (ports 8080, 5173)
#   db     PostgreSQL 16                      (no host port)
#   redis  Redis 7                            (no host port)
#
# Source is bind-mounted. Vendor, node_modules, bootstrap/cache,
# storage/framework, storage/logs are anonymous volumes so host tools
# never collide with container state.
#
# Run every composer/artisan command via  docker compose exec app ...
# Never run them on the host.
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"      # Laravel
      - "${VITE_PORT:-5173}:5173"    # Vite HMR
    env_file: .env
    volumes:
      # Source code — live edits on host appear in container.
      - .:/var/www/html
      # Container-owned directories (anonymous volumes seeded from the image).
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage/framework
      - /var/www/html/storage/logs
      # Named volume for user-uploaded media, survives rebuilds.
      - storage_public:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"     # web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP listener
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpitdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8025/api/v1/info"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  dbdata:
  redisdata:
  mailpitdata:
  storage_public:
