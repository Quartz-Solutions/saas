# ============================================================================
# Production stack
# ----------------------------------------------------------------------------
#   app        PHP-FPM + nginx + baked assets  (port 80)
#   queue      php artisan queue:work          (no port)
#   scheduler  loop schedule:run every 60s     (no port)
#   db         PostgreSQL 16                   (no port)
#   redis      Redis 7                         (no port)
#
# Source is baked into the image — no bind mounts, no host dependencies.
# All runtime values come from .env.production (single source of truth).
#
# Usage:
#   cp .env.production.example .env.production
#   # edit .env.production — set APP_KEY, DB_PASSWORD, MAIL_*, DOMAIN, etc.
#   docker compose --env-file .env.production -f docker-compose.prod.yml build
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d
#   docker compose --env-file .env.production -f docker-compose.prod.yml exec app php artisan migrate --force
# ============================================================================

x-app-build: &app_build
  build:
    context: .
    dockerfile: docker/prod/Dockerfile

services:
  app:
    <<: *app_build
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    env_file: .env.production
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  queue:
    <<: *app_build
    restart: always
    env_file: .env.production
    entrypoint: ["/bin/sh", "-c"]
    # Single-string arg so `sh -c` runs the whole command — a list-form
    # command here would be parsed as positional args ($0,$1,...) and only
    # `php` would execute, exiting immediately into a restart loop.
    command: ["php artisan queue:work --sleep=3 --tries=3 --max-time=3600"]
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    <<: *app_build
    restart: always
    env_file: .env.production
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  dbdata:
  redisdata:
  storage_public:
  storage_logs:
